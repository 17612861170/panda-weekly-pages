<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>熊猫密室兼职人效周报</title>
  <style>
    :root {
      color-scheme: light;
      --navy: #1f4e78;
      --teal: #19766f;
      --ink: #24343d;
      --muted: #667780;
      --line: #d8e2e8;
      --paper: #ffffff;
      --wash: #f3f7f9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--wash);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    header {
      height: 58px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      background: var(--navy);
      color: #fff;
      font-weight: 700;
    }

    main {
      min-height: calc(100vh - 58px);
      display: grid;
      place-items: center;
      padding: 40px 24px;
    }

    .content {
      width: min(720px, 100%);
      text-align: center;
    }

    .file-type {
      margin: 0 0 14px;
      color: var(--teal);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .period {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    a {
      min-width: 150px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border: 1px solid var(--navy);
      border-radius: 6px;
      color: var(--navy);
      background: var(--paper);
      font-weight: 700;
      text-decoration: none;
    }

    a.primary {
      background: var(--navy);
      color: #fff;
    }

    a:hover { filter: brightness(0.96); }
    a:focus-visible { outline: 3px solid #9cc7df; outline-offset: 3px; }

    .meta {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 520px) {
      header { padding: 0 18px; }
      main { padding: 28px 18px; }
      h1 { font-size: 27px; }
      .actions { display: grid; }
      a { width: 100%; }
    }
  </style>
</head>
<body>
  <header>熊猫密室</header>
  <main>
    <section class="content" aria-labelledby="title">
      <p class="file-type">Excel 工作簿</p>
      <h1 id="title">兼职人效周报</h1>
      <p class="period">2026-07-06 至 2026-07-12<br>周末及国家法定节假日版</p>
      <div class="actions">
        <a class="primary" href="https://view.officeapps.live.com/op/view.aspx?src=https%3A%2F%2F17612861170.github.io%2Fpanda-weekly-pages%2Fdownloads%2Fpart-time-efficiency%2F20260706-20260712%2Fpanda-part-time-efficiency-weekend-holidays.xlsx" target="_blank" rel="noopener">在线预览</a>
        <a href="https://raw.githubusercontent.com/17612861170/panda-weekly-pages/main/downloads/part-time-efficiency/20260706-20260712/panda-part-time-efficiency-weekend-holidays.xlsx">下载 Excel</a>
      </div>
      <p class="meta">2026-07-22 更新 · 50.5 KB</p>
    </section>
  </main>
</body>
</html>
